# Railway service config for the FastAPI API.
# In Railway: set Root Directory to services/api
# (Settings → Source → Root Directory).
#
# If Railway does not pick this up automatically, set the config file path to:
# /services/api/railway.toml

[build]
builder = "RAILPACK"
buildCommand = "pip install -e '.[postgres]'"

[deploy]
preDeployCommand = ["alembic upgrade head"]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
